name: CI

# Fast checks only — no build, no release, no artifacts.
# Runs on every pull request, and is reused by release.yml via workflow_call.

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    name: Syntax check & UI smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile all sources
        run: python -m compileall -q src scripts
      - name: Install UI smoke-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon0 libdbus-1-3 libfontconfig1 libfreetype6
          python -m pip install --upgrade pip
          pip install "PySide6>=6.6" Pillow
      - name: Qt UI smoke test (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: PYTHONPATH=src python -c "import sys; from listen_to_me.selftest import gui_smoke; sys.exit(gui_smoke())"
